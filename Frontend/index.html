<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Package Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">📦 Package Tracking Dashboard</h1>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">Track a Package</div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="text" id="trackNumber" class="form-control" placeholder="Enter Tracking Number (e.g., TRK12345)">
                    <button class="btn btn-success" onclick="trackPackage()">Track</button>
                </div>
                <div id="trackResult" class="mt-3"></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">Admin: All Packages</div>
            <div class="card-body">
                <button class="btn btn-secondary mb-3" onclick="loadAllPackages()">Refresh List</button>
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tracking Number</th>
                            <th>Status</th>
                            <th>Location</th>
                        </tr>
                    </thead>
                    <tbody id="packagesTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
